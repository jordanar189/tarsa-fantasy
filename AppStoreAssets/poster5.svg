<svg width="1290" height="2796" viewBox="0 0 1290 2796" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1535"/>
      <stop offset="1" stop-color="#020412"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#46e4ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#46e4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.78" r="0.6">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="iconClip">
      <rect x="495" y="380" width="300" height="300" rx="66" ry="66"/>
    </clipPath>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg)"/>
  <rect width="1290" height="2796" fill="url(#glow)"/>
  <rect width="1290" height="2796" fill="url(#glow2)"/>

  <image href="../Fantasy Football App/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
         x="495" y="380" width="300" height="300"
         clip-path="url(#iconClip)"/>

  <!-- Tag chips -->
  <g transform="translate(165, 800)" font-family="Helvetica" font-weight="bold" font-size="36">
    <rect x="0"   y="0" width="280" height="70" rx="35" fill="#46e4ff"/>
    <text x="140" y="48" text-anchor="middle" fill="#020412">Standings</text>
    <rect x="300" y="0" width="280" height="70" rx="35" fill="#7c5cff"/>
    <text x="440" y="48" text-anchor="middle" fill="#ffffff">Scoreboard</text>
    <rect x="600" y="0" width="280" height="70" rx="35" fill="#46e4ff" opacity="0.7"/>
    <text x="740" y="48" text-anchor="middle" fill="#020412">Rosters</text>
    <rect x="100" y="100" width="280" height="70" rx="35" fill="#7c5cff" opacity="0.7"/>
    <text x="240" y="148" text-anchor="middle" fill="#ffffff">Snake draft</text>
    <rect x="400" y="100" width="280" height="70" rx="35" fill="#46e4ff" opacity="0.85"/>
    <text x="540" y="148" text-anchor="middle" fill="#020412">Auto-lineup</text>
  </g>

  <text x="645" y="1360" text-anchor="middle"
        font-family="Helvetica" font-weight="bold" font-size="160" fill="#ffffff">One app.</text>
  <text x="645" y="1530" text-anchor="middle"
        font-family="Helvetica" font-weight="bold" font-size="160" fill="#46e4ff">Whole season.</text>

  <text x="645" y="1720" text-anchor="middle"
        font-family="Helvetica" font-size="62" fill="#ffffff" opacity="0.72">Everything your league needs. Nothing it doesn't.</text>

  <text x="645" y="2650" text-anchor="middle"
        font-family="Helvetica" font-weight="bold" font-size="44" fill="#ffffff" opacity="0.55">FANTASY FOOTBALL</text>
</svg>
