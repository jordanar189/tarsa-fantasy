<svg width="1290" height="2796" viewBox="0 0 1290 2796" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1535"/>
      <stop offset="1" stop-color="#020412"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#46e4ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#46e4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.78" r="0.5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="iconClip">
      <rect x="495" y="380" width="300" height="300" rx="66" ry="66"/>
    </clipPath>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg)"/>
  <rect width="1290" height="2796" fill="url(#glow)"/>
  <rect width="1290" height="2796" fill="url(#glow2)"/>

  <image href="../Fantasy Football App/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
         x="495" y="380" width="300" height="300"
         clip-path="url(#iconClip)"/>

  <!-- Lineup-slot pills -->
  <g transform="translate(255, 800)">
    <g font-family="Helvetica" font-weight="bold" font-size="44" fill="#ffffff">
      <rect x="0"   y="0"  width="180" height="80" rx="40" fill="#46e4ff" opacity="0.9"/>
      <text x="90"  y="55" text-anchor="middle" fill="#020412">QB</text>
      <rect x="200" y="0"  width="180" height="80" rx="40" fill="#46e4ff" opacity="0.65"/>
      <text x="290" y="55" text-anchor="middle" fill="#020412">RB</text>
      <rect x="400" y="0"  width="180" height="80" rx="40" fill="#7c5cff" opacity="0.9"/>
      <text x="490" y="55" text-anchor="middle" fill="#ffffff">WR</text>
      <rect x="600" y="0"  width="180" height="80" rx="40" fill="#7c5cff" opacity="0.65"/>
      <text x="690" y="55" text-anchor="middle" fill="#ffffff">FLEX</text>
    </g>
  </g>

  <text x="645" y="1340" text-anchor="middle"
        font-family="Helvetica" font-weight="bold" font-size="160" fill="#ffffff">Set it.</text>
  <text x="645" y="1510" text-anchor="middle"
        font-family="Helvetica" font-weight="bold" font-size="160" fill="#46e4ff">Then watch.</text>

  <text x="645" y="1700" text-anchor="middle"
        font-family="Helvetica" font-size="62" fill="#ffffff" opacity="0.72">Smart auto-filled lineups, every week.</text>

  <text x="645" y="2650" text-anchor="middle"
        font-family="Helvetica" font-weight="bold" font-size="44" fill="#ffffff" opacity="0.55">FANTASY FOOTBALL</text>
</svg>
