name: Supabase db push

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-db-push.yml'
  workflow_dispatch:

concurrency:
  group: supabase-db-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        # --include-all: the 20260515000000_baseline_core.sql baseline sorts
        # before migrations that were already applied to prod by hand, and
        # without the flag the CLI refuses the out-of-order insert and exits 1
        # — which silently blocked every migration push after the baseline
        # merged. The baseline is fully idempotent (if-not-exists guards) so
        # applying it out of order against prod is a designed no-op; it can't
        # be renamed to sort last because fresh-database replays need it first.
        run: supabase db push --include-all
