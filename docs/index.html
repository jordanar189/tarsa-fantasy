<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarsa Fantasy</title>
  <meta name="description" content="Fantasy football with your crew. Real NFL stats, custom leagues, live scoring." />
  <meta name="theme-color" content="#0a0d1a" />
  <meta property="og:title" content="Tarsa Fantasy" />
  <meta property="og:description" content="Fantasy football with your crew." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --bg: #0a0d1a;
      --surface: #12172a;
      --border: #232a3d;
      --text: #e8eaf2;
      --text-dim: #9aa3bd;
      --cyan: #46e4ff;
      --violet: #7e5cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(60% 50% at 50% 0%, rgba(126, 92, 255, 0.22), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
    }
    .mark {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      background: linear-gradient(120deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 22px;
    }
    h1 {
      font-size: clamp(40px, 9vw, 76px);
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: -0.02em;
      max-width: 12ch;
    }
    h1 .accent {
      background: linear-gradient(120deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p.tagline {
      margin-top: 20px;
      font-size: clamp(16px, 4vw, 20px);
      color: var(--text-dim);
      max-width: 38ch;
      line-height: 1.5;
    }
    .features {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 560px;
    }
    .pill {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
    }
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px 20px;
      color: var(--text-dim);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <main>
    <div class="mark">Tarsa Fantasy</div>
    <h1>Fantasy football<br /><span class="accent">with your crew.</span></h1>
    <p class="tagline">Custom leagues, real NFL stats, live scoring, and a draft room — built for the group chat.</p>
    <div class="features">
      <span class="pill">Custom scoring &amp; rosters</span>
      <span class="pill">Live scoreboards</span>
      <span class="pill">Snake drafts</span>
      <span class="pill">Waivers &amp; trades</span>
    </div>
  </main>
  <footer>
    &copy; <span id="year"></span> Tarsa Fantasy
  </footer>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
